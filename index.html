<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <div id="screen"></div>
    <div id="keyboard">
        <div id="number">
            <div class="row" id ="row-one">
                <button class="digit-number" id="but-one">1</button>
                <button class="digit-number" id="but-two">2</button>
                <button class="digit-number" id="but-three">3</button>
            </div>
            <div class="row" id ="row-two">
                <button class="digit-number" id="but-four">4</button>
                <button class="digit-number" id="but-five">5</button>
                <button class="digit-number" id="but-six">6</button>
            </div>
            <div class="row" id ="row-three">
                <button class="digit-number" id="but-seven">7</button>
                <button class="digit-number" id="but-eight">8</button>
                <button class="digit-number" id="but-nine">9</button>
            </div>
            <div div class="row" id ="row-four">
                <button class="digit-number" id="but-zero">0</button>
            </div>
        </div>
        <div id="operator">
            <button id="but-delete">C</button>
            <button class ="operator" id="add">+</button>
            <button class ="operator" id="subtract">-</button>
            <button class ="operator" id="multiply">*</button>
            <button class ="operator" id="divide">/</button>
            <button id="but-equal">=</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
